function ac() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }

function sfxTone(freq, dur, type, vol, when, slideTo) {
  const ctx = ac(); if (!ctx || muted) return;
  const t0 = ctx.currentTime + (when || 0);
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol || 0.12, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function sfxNoise(dur, vol, freq) { // 纸页摩挲
  const ctx = ac(); if (!ctx || muted) return;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq || 2400; f.Q.value = 0.8;
  const g = ctx.createGain(); g.gain.value = vol || 0.1;
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start();
}

// 四波运动分章 (对齐 herstory 正典: 四波 × 18 节点)
function waveOf(id) {
  const n = parseInt(id.slice(1), 10);
  if (n <= 4)  return { n: 1, short: '第一波', label: '第一波 · 争取基本权利 1848–1920' };
  if (n <= 9)  return { n: 2, short: '第二波', label: '第二波 · 解放运动 1949–1982' };
  if (n <= 12) return { n: 3, short: '第三波', label: '第三波 · 多元与文化政治 1989–2013' };
  return { n: 4, short: '第四波', label: '第四波 · 数字时代 2013–' };
}

  // 身体归零的语境死: 1920-1963 已婚女性无医疗自主权时代 → 签字栏 (没人给她签手术同意书)
  if (key === 'body0' && gen >= 3 && gen <= 5) return 'consent';
  // 钱满格的语境死: 后期 (N11+, 1990s 起女性金钱掌控变高) → 庆功宴 (被品牌收购)
  if (key === 'money100' && gen >= 10) return 'cashout';
  return key;
}

// ---------------- 运行状态 ----------------
let gen, stats, queue, qi, legacy, genLog, deathInfo;
let reachable; // 本局抽到的卡里"路过"的火种（4选1 → 每局只路过一部分）
let eraNotes = []; // 本棒注脚 (棒间回顾用, 每棒重置; legacy.notes 仍全程累计)

// 跨局收集 (Reigns memento mori 式)
function loadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch (e) { return new Set(); }
}
function saveSet(key, set) {
  try { localStorage.setItem(key, JSON.stringify([...set])); } catch (e) {}
}
const everLit = loadSet('herstory_everLit');
const everDeaths = loadSet('herstory_everDeaths');

function trackReachable() {
  for (const c of queue) {
    if (c.L && c.L.mile) reachable.add(c.L.mile);
    if (c.R && c.R.mile) reachable.add(c.R.mile);
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function rnd(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

// 默认 4 包选 1; era.pick=2 时抽两包 (素材厚的棒停留更久) + 随机插入 1 张时代风险卡
// Breakout Room「走夜路」— 跨棒通用的短暂插播 (学 Reigns 1 Pungeon: 序列选择决定结局;
// 解剖警告: break-out 必须短暂插播不可主线化)。前两步的"风险组合"≥2 → 第三步死于「夜路」。
let nightRisk = 0;
const BREAKOUT_NIGHT = [
  { id: 'BR-NIGHT-1', brStart: true,
    d: '散场之后', sp: '夜', role: '回家的路', cameo: '☾',
    t: '比预想的晚。回家两条路：灯亮的大路，要穿过酒馆门口那群人；近路是一条黑巷。',
    L: { lab: '（走大路，穿过人群）', fx: { self: -2 } },
    R: { lab: '（走黑巷，快）', fx: { body: -1 }, risk: 1 },
    note: '大路有目光，小巷有黑暗——这道选择题，每个时代的女人睡前都做过。它不属于哪一棒：它属于全部十八棒。' },
  { id: 'BR-NIGHT-2',
    d: '半路', sp: '身后', role: '脚步声', cameo: '☾',
    t: '有脚步声跟了上来。不紧不慢，和你保持着同样的速度。',
    L: { lab: '（停下，假装看橱窗，让他先过）', fx: { self: -1 } },
    R: { lab: '（加快脚步）', fx: { body: -1 }, risk: 1 },
    note: '也许只是顺路——多数时候确实只是顺路。但"也许"两个字把每条夜路都变成一场单方面的赌注：他赌的是无聊与否，你赌的是安全与否。下注的筹码，从来不对等。' },
  { id: 'BR-NIGHT-3',
    d: '最后一段', sp: '家门在望', role: '钥匙在包底', cameo: '☾',
    t: '还有五十步。',
    L: { lab: '（钥匙夹进指缝，贴墙快走）', fx: { self: +3 }, brResolve: true },
    R: { lab: '（回头看一眼，记住那张脸）', fx: { self: +2, voice: +1 }, brResolve: true },
    note: '平安到家不会上新闻，统计表上也没有这一栏——它只是让你明天能继续上场。一百七十八年里，无数次接力就是这样，在无人记录的夜路上完成的。' },
];

// 职业随机: era.roles = [{protag, packs:[包下标], hazards:[风险卡下标], open?, finale?}]
// 有 roles 的棒开局先二选一职业; 包池/风险池/开场/收尾按职业过滤 (玩家: 职业史本身要看得见变化)
function buildQueue(era, role) {
  const n = era.pick || 1;
  const pool = role ? role.packs.map(i => era.packs[i]) : era.packs;
  const picked = shuffle(pool.slice()).slice(0, n);
  const cards = [(role && role.open) || era.open];
  for (const p of picked) cards.push(...p);
  cards.push((role && role.finale) || era.finale);
  const hzPool = (role && role.hazards) ? role.hazards.map(i => era.hazards[i]) : (era.hazards || []);
  if (hzPool.length) {
    const hz = hzPool[Math.floor(Math.random() * hzPool.length)];
    const pos = 1 + Math.floor(Math.random() * (cards.length - 1));
    cards.splice(pos, 0, hz);
  }
  if (Math.random() < 0.12) { // ~每局 2 次夜路, 张弛有度 (玩家: 时不时进入)
    const pos = 1 + Math.floor(Math.random() * (cards.length - 1));
    cards.splice(pos, 0, ...BREAKOUT_NIGHT);
  }
  return cards;
}

let pendingRoles = null; // 职业二选一的待定状态
function offerRoles(era, introText) {
  pendingRoles = shuffle(era.roles.slice()).slice(0, 2);
  showCard({
    d: '', sp: '—— 接 力 ——', role: '这一棒，你是谁？', cameo: '✦',
    t: introText,
    L: { lab: pendingRoles[0].protag }, R: { lab: pendingRoles[1].protag },
  }, 'rolepick');
}
function applyRole(role) {
  const era = ERAS[gen];
  era._protag = role.protag;
  queue = buildQueue(era, role);
  trackReachable();
  qi = 0;
  document.getElementById('eraBanner').textContent =
    waveOf(era.id).short + ' ｜ ' + era.banner + ' — ' + role.protag;
  renderStats(null);
  showCurrent();
}

// ---------------- 断点续玩 (玩家: 停下再进来从当前棒继续, 不怕 18 棒长) ----------------
// 每棒开局存档; 跑完全程清档; 回来时给「继续/重开」二选一
const CKPT_KEY = 'herstory_ckpt_v13';
let pendingResume = null;
function saveCheckpoint() {
  try {
    localStorage.setItem(CKPT_KEY, JSON.stringify({
      gen, stats,
      miles: legacy.miles, notes: legacy.notes,
      genLog: genLog.map(g => ({ id: g.era.id, protag: g.protag, fate: g.fate, deathKey: g.deathKey })),
      reachable: [...reachable],
    }));
  } catch (e) {}
}
function loadCheckpoint() {
  try { return JSON.parse(localStorage.getItem(CKPT_KEY) || 'null'); } catch (e) { return null; }
}
function clearCheckpoint() {
  try { localStorage.removeItem(CKPT_KEY); } catch (e) {}
}
function restoreCheckpoint(s) {
  gen = s.gen;
  stats = s.stats;
  legacy = { miles: s.miles || [], notes: s.notes || [] };
  genLog = (s.genLog || []).map(e => ({
    era: ERAS.find(x => x.id === e.id) || ERAS[0],
    protag: e.protag, fate: e.fate, deathKey: e.deathKey,
  }));
  reachable = new Set(s.reachable || []);
  deathInfo = null;
  eraNotes = [];
  document.getElementById('endScreen').classList.remove('show');
  const era = ERAS[gen];
  renderStats(null);
  if (era.roles) {
    document.getElementById('eraBanner').textContent =
      waveOf(era.id).short + ' ｜ ' + era.banner;
    offerRoles(era, era.transitionIn.t + ' （续上次的接力。）');
    return;
  }
  queue = buildQueue(era);
  trackReachable();
  qi = 0;
  document.getElementById('eraBanner').textContent =
    waveOf(era.id).short + ' ｜ ' + era.banner + ' — ' + era.protag;
  showCard({
    d: '', sp: '—— 接 力 ——', role: era.protag, cameo: '✦',
    t: era.transitionIn.t + ' （续上次的接力。）',
    L: { lab: '深吸一口气' }, R: { lab: '继续' },
  }, 'transition');
}

// 测试/选关入口: URL 加 ?start=N05 (或 ?start=5) 从指定棒开局
const START_GEN = (() => {
  const m = (location.search.match(/[?&]start=N?0?(\d{1,2})/i) || [])[1];
  const n = m ? parseInt(m, 10) - 1 : 0;
  return (n >= 0 && n < ERAS.length) ? n : 0;
})();

function newGame() {
  gen = START_GEN;
  stats = {};
  for (const s of STATS) stats[s.key] = 50 + rnd(-8, 8); // 出生即随机
  legacy = { miles: [], notes: [] };
  genLog = [];
  deathInfo = null;
  reachable = new Set();
  eraNotes = [];
  skipEraSfx = false;
  saveCheckpoint();
  document.getElementById('endScreen').classList.remove('show');
  if (ERAS[gen].roles) { // 开局即职业棒 (?start= 测试路径)
    document.getElementById('eraBanner').textContent =
      waveOf(ERAS[gen].id).short + ' ｜ ' + ERAS[gen].banner;
    renderStats(null);
    offerRoles(ERAS[gen], ERAS[gen].transitionIn.t);
    return;
  }
  queue = buildQueue(ERAS[gen]);
  trackReachable();
  qi = 0;
  document.getElementById('eraBanner').textContent =
    waveOf(ERAS[gen].id).short + ' ｜ ' + ERAS[gen].banner + ' — ' + ERAS[gen].protag;
  renderStats(null);
  showCurrent();
}

// ---------------- stats UI ----------------
const statsEl = document.getElementById('stats');
statsEl.innerHTML = STATS.map(s => `
  <div class="stat" id="stat-${s.key}">
    <div class="dot" id="dot-${s.key}"></div>
    <div class="icon">${s.icon}</div>
    <div class="label">${s.label}</div>
    <div class="bar"><div class="fill" id="fill-${s.key}" style="width:50%"></div></div>
  </div>`).join('');

function renderStats(changed) {
  for (const s of STATS) {
    document.getElementById('fill-' + s.key).style.width =
      Math.max(0, Math.min(100, stats[s.key])) + '%';
    const box = document.getElementById('stat-' + s.key);
    box.classList.remove('flash-up', 'flash-down');
    if (changed && changed[s.key]) {
      box.classList.add(changed[s.key] > 0 ? 'flash-up' : 'flash-down');
      setTimeout(() => box.classList.remove('flash-up', 'flash-down'), 450);
    }
  }
}

function showHintDots(fx, opacity) {
  for (const s of STATS) {
    const dot = document.getElementById('dot-' + s.key);
    const v = fx ? (fx[s.key] || 0) : 0;
    if (!v) { dot.style.opacity = 0; dot.textContent = ''; continue; }
    const big = Math.abs(v) >= 8; // 小点放大一倍 (原 • 眯眼才能看见), 仍明显小于大点
    dot.textContent = big ? '⬤' : '●';
    dot.style.fontSize = big ? '15px' : '11px';
    dot.style.opacity = opacity;
  }
}

// ---------------- card UI ----------------
const stage = document.getElementById('stage');
let cardEl = null;
let activeCard = null;

function buildCardEl(card, behind, special) {
  const el = document.createElement('div');
  el.className = 'card' + (behind ? ' behind' : '') + (special ? ' special' : '');
  el.innerHTML = `
    <div class="cameo">${card.cameo || '❦'}</div>
    <div class="speaker">${card.sp || ''}</div>
    <div class="role">${card.role || ''}</div>
    ${card.q ? `<div class="quote">${card.q}</div>` : ''}
    <div class="text">${card.t}</div>`;
  return el;
}

let pendingCardNotes = null; // 注脚挂载: 下一张卡(死亡/转场)底部附本棒注脚
function showCard(card, kind) {
  activeCard = { card, kind };
  stage.innerHTML = '';
  if (kind === 'play' && qi + 1 < queue.length) {
    stage.appendChild(buildCardEl(queue[qi + 1], true, false));
  }
  cardEl = buildCardEl(card, false, kind !== 'play');
  if (pendingCardNotes && pendingCardNotes.length && kind !== 'play') {
    const btn = document.createElement('div');
    btn.className = 'notesBtn';
    btn.textContent = `📜 本棒史实注脚（${pendingCardNotes.length} 条）· 点开看`;
    const panel = document.createElement('div');
    panel.className = 'notesPanel';
    panel.innerHTML = '<div class="cardNotesHead">— 本 棒 史 实 注 脚 · 再点下方横幅收起 —</div>'
      + pendingCardNotes.map(n => `<div class="footnote">${n}</div>`).join('');
    // 阻断卡片拖拽: 横幅可点、浮层内可滚动, 卡片其余区域照常左右滑
    [btn, panel].forEach(el => ['pointerdown', 'touchstart', 'mousedown'].forEach(ev =>
      el.addEventListener(ev, e => e.stopPropagation())));
    btn.addEventListener('click', () => {
      const open = panel.classList.toggle('open');
      if (open) SFX.notesOpen(); else SFX.notesClose(); // 开卷/合卷
      btn.textContent = open ? '📜 收起注脚' : `📜 本棒史实注脚（${panel.querySelectorAll('.footnote').length} 条）· 点开看`;
    });
    cardEl.appendChild(btn);
    cardEl.appendChild(panel);
    pendingCardNotes = null;
  }
  stage.appendChild(cardEl);
  attachDrag(cardEl, card);
  if (kind === 'vignette') SFX.death();
  else if (kind === 'transition' || kind === 'rolepick') {
    if (skipEraSfx) skipEraSfx = false;
    else SFX.era();
  }
  document.getElementById('dateline').textContent = card.d ? '— ' + card.d + ' —' : '';
  document.getElementById('btnLText').textContent = card.L.lab;
  document.getElementById('btnRText').textContent = card.R.lab;
  showHintDots(null, 0);
}

function showCurrent() { showCard(queue[qi], 'play'); }

// ---------------- drag ----------------
function attachDrag(el, card) {
  let startX = 0, dx = 0, dragging = false;
  const hintL = document.getElementById('hintGL');
  const hintR = document.getElementById('hintGR');
  hintL.textContent = card.L.lab;
  hintR.textContent = card.R.lab;
  hintL.style.opacity = 0;
  hintR.style.opacity = 0;
  function onDown(e) {
    dragging = true;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    el.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    dx = x - startX;
    el.style.transform = `translateX(${dx}px) rotate(${dx / 14}deg)`;
    const op = Math.min(1, Math.abs(dx) / 90);
    if (dx < -20) { hintL.style.opacity = op; hintR.style.opacity = 0; showHintDots(card.L.fx, op); }
    else if (dx > 20) { hintR.style.opacity = op; hintL.style.opacity = 0; showHintDots(card.R.fx, op); }
    else { hintL.style.opacity = 0; hintR.style.opacity = 0; showHintDots(null, 0); }
    if (e.cancelable) e.preventDefault();
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    if (dx < -80) commit('L');
    else if (dx > 80) commit('R');
    else {
      el.style.transition = 'transform 0.2s';
      el.style.transform = '';
      hintL.style.opacity = 0; hintR.style.opacity = 0;
      showHintDots(null, 0);
    }
    dx = 0;
  }
  el.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove, { passive: false });
  window.addEventListener('pointerup', onUp);
  el.addEventListener('touchstart', onDown, { passive: true });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);
}

// ---------------- 主流程 ----------------
function commit(side) {
  if (!activeCard) return;
  const { card, kind } = activeCard;
  const choice = card[side];
  SFX.flip(side);
  if (cardEl) {
    cardEl.style.transition = 'transform 0.2s ease-in, opacity 0.2s';
    cardEl.style.transform = `translateX(${side === 'L' ? -520 : 520}px) rotate(${side === 'L' ? -26 : 26}deg)`;
    cardEl.style.opacity = '0';
  }
  activeCard = null;

  if (kind === 'vignette') { setTimeout(() => afterDeath(), 220); return; }
  if (kind === 'transition') { setTimeout(() => { renderStats(null); showCurrent(); }, 220); return; }
  if (kind === 'rolepick') {
    const role = side === 'L' ? pendingRoles[0] : pendingRoles[1];
    pendingRoles = null;
    setTimeout(() => applyRole(role), 220);
    return;
  }
  if (kind === 'resume') {
    const saved = pendingResume;
    pendingResume = null;
    setTimeout(() => {
      if (side === 'R' && saved) restoreCheckpoint(saved);
      else { clearCheckpoint(); newGame(); }
    }, 220);
    return;
  }

  const changed = {};
  for (const k of Object.keys(choice.fx || {})) {
    const v = Math.round(choice.fx[k] * FX_SCALE);
    stats[k] += v;
    changed[k] = v;
  }
  if (choice.mile && !legacy.miles.includes(choice.mile)) {
    legacy.miles.push(choice.mile);
    everLit.add(choice.mile);
    saveSet('herstory_everLit', everLit);
  }
  if (card.note && !legacy.notes.includes(card.note)) legacy.notes.push(card.note);
  if (card.note && !eraNotes.includes(card.note)) eraNotes.push(card.note);
  renderStats(changed);
  showHintDots(null, 0);

  // Breakout「走夜路」: 路径风险累积
  if (card.brStart) nightRisk = 0;
  if (choice.risk) nightRisk += choice.risk;

  // 死亡判定: 事件死 > 夜路组合 > 端点死(经组合变体解析)
  let deathKey = null;
  if (choice.kill) {
    deathKey = choice.kill;
  } else if (choice.brResolve && nightRisk >= 2) {
    deathKey = 'nightroad';
  } else {
    for (const s of STATS) {
      if (stats[s.key] <= 0) { deathKey = resolveDeath(s.key + '0'); break; }
      if (stats[s.key] >= 100) { deathKey = resolveDeath(s.key + '100'); break; }
    }
  }
  for (const s of STATS) stats[s.key] = Math.max(0, Math.min(100, stats[s.key]));
  renderStats(null);

  setTimeout(() => {
    if (deathKey) {
      deathInfo = deathKey;
      everDeaths.add(deathKey);
      saveSet('herstory_everDeaths', everDeaths);
      genLog.push({ era: ERAS[gen], protag: ERAS[gen]._protag || ERAS[gen].protag, fate: 'died', deathKey });
      const dv = DEATHS[deathKey];
      if (card.note && !legacy.notes.includes(card.note)) legacy.notes.push(card.note);
      if (card.note && !eraNotes.includes(card.note)) eraNotes.push(card.note);
      pendingCardNotes = eraNotes.slice(); // 死亡卡底部附本棒注脚
      showCard({
        d: '', sp: dv.title, role: '这一代到此为止', cameo: '✣',
        t: dv.t + (gen < ERAS.length - 1 ? ' —— 但故事没有停。' : ''),
        L: { lab: '合上她的眼睛' }, R: { lab: '记住她' },
      }, 'vignette');
    } else if (qi >= queue.length - 1) {
      genLog.push({ era: ERAS[gen], protag: ERAS[gen]._protag || ERAS[gen].protag, fate: 'survived' });
      SFX.survive(); // 活过这个时代 — 明朗一点
      skipEraSfx = true;
      nextEra(false);
    } else {
      qi++;
      showCurrent();
    }
  }, 230);
}

function afterDeath() {
  if (gen >= ERAS.length - 1) { showFinal(); return; }
  nextEra(true);
}

function nextEra(died) {
  gen++;
  if (gen >= ERAS.length) { showFinal(); return; }
  // 善终的棒: 注脚附在转场/选职业卡底部 (死亡的棒已附在死亡卡上, 不重复)
  if (!died && eraNotes.length) pendingCardNotes = eraNotes.slice();
  eraNotes = [];
  const era = ERAS[gen];
  const carry = died ? 0.25 : 0.4;
  for (const s of STATS) {
    let v = 50 + Math.round((stats[s.key] - 50) * carry) + rnd(-5, 5); // 投胎自带随机
    stats[s.key] = Math.max(25, Math.min(78, v));
  }
  if (died && deathInfo && DEATHS[deathInfo]) {
    const k = deathInfo.replace(/0|100/, '');
    if (stats[k] !== undefined) stats[k] = Math.max(22, stats[k] - 8);
  }
  const bonus = Math.min(6, legacy.miles.length);
  // 火种回响不再全压「自己」(否则收集火种=加速纯洁螺旋)，折半分给「话语」
  const bSelf = Math.ceil(bonus / 2), bVoice = Math.floor(bonus / 2);
  stats.self = Math.min(70, stats.self + bSelf);
  stats.voice = Math.min(82, stats.voice + bVoice);
  deathInfo = null;
  saveCheckpoint();

  const inherit = legacy.miles.length
    ? `这场接力至今点燃 ${legacy.miles.length} 处火种，它们替这一代暖了身：自我 +${bSelf}、话语 +${bVoice}（火种加成封顶 +6）。`
    : '前面的棒次没能留下多少痕迹——一切几乎从头来过。';
  if (era.roles) { // 职业二选一的棒: 先选人, 再建牌堆
    document.getElementById('eraBanner').textContent =
      waveOf(era.id).short + ' ｜ ' + era.banner;
    offerRoles(era, era.transitionIn.t + ' ' + inherit);
    return;
  }
  queue = buildQueue(era);
  trackReachable();
  qi = 0;
  document.getElementById('eraBanner').textContent =
    waveOf(era.id).short + ' ｜ ' + era.banner + ' — ' + era.protag;
  showCard({
    d: '', sp: '—— 接 力 ——', role: era.protag, cameo: '✦',
    t: era.transitionIn.t + ' ' + inherit,
    L: { lab: '深吸一口气' }, R: { lab: '开始' },
  }, 'transition');
}

// ---------------- 终局 ----------------
function showFinal() {
  const fateLine = g => {
    if (g.fate === 'survived') return '活过了她的时代。';
    return '死于「' + DEATHS[g.deathKey].title + '」。';
  };
  document.getElementById('endTitle').textContent = '1848 — 2026';
  let html = genLog.length + ' 棒接力，从 1848 跑到 2026——178 年，这一次是全程。<br>';
  let lastWave = 0;
  genLog.forEach(g => {
    const w = waveOf(g.era.id);
    if (w.n !== lastWave) {
      html += `<div style="margin-top:10px;font-size:12px;letter-spacing:2px;color:#7a684c">── ${w.label} ──</div>`;
      lastWave = w.n;
    }
    html += `<div class="genline"><b>${g.era.banner}</b><br>${g.protag || g.era.protag} — ${fateLine(g)}</div>`;
  });
  html += `<div style="margin-top:14px"><b>火种：整场接力共点燃 ${legacy.miles.length} 处 / 本局抽到的卡里共路过 ${reachable.size} 处</b>`
    + `<span style="font-size:12px;color:#7a684c">（全图共 ${Object.keys(MILESTONES).length} 处——每局只随机路过一部分）</span><br>`;
  for (const [k, label] of Object.entries(MILESTONES)) {
    if (!reachable.has(k)) continue; // 本局没抽到的不显示, 避免误读成"没推动"
    html += `<span class="mile${legacy.miles.includes(k) ? '' : ' off'}">${legacy.miles.includes(k) ? '🔥 ' : '✗ '}${label}</span>`;
  }
  html += `<div style="margin-top:6px;font-size:12px;color:#7a684c">历局累计：火种 ${everLit.size}/${Object.keys(MILESTONES).length} · 死法 ${everDeaths.size}/${Object.keys(DEATHS).length}</div>`;
  html += `</div><div style="margin-top:14px;font-style:italic">历史上：美国女性 1920 年获得投票权，南方黑人女性的选票被架空到 1965；法国女性 1944 年才能投票，1965 年才能自己开银行账户；美国已婚女性 1974 年才能独立办信用卡。Alice Paul 1923 年起草的平等权利修正案，至今（2026）仍未写进宪法；2022 年，稳固了半个世纪的 Roe 被推翻——里程碑也会倒退，这正是接力不能停的原因。<br><br>这局你抽到的只是每个时代的一小角。</div>`;
  document.getElementById('endBody').innerHTML = html;
  document.getElementById('endNotes').innerHTML =
    legacy.notes.map(n => `<div class="footnote">${n}</div>`).join('');
  document.getElementById('endScreen').classList.add('show');
  clearCheckpoint(); // 跑完全程, 下次从头开始
}

// ---------------- 输入 ----------------
document.getElementById('btnL').addEventListener('click', () => {
  if (!document.getElementById('endScreen').classList.contains('show')) commit('L');
});
document.getElementById('btnR').addEventListener('click', () => {
  if (!document.getElementById('endScreen').classList.contains('show')) commit('R');
});
document.addEventListener('keydown', e => {
  if (document.getElementById('endScreen').classList.contains('show')) {
    if (e.key === ' ' || e.key === 'Enter') newGame();
    return;
  }
  if (e.key === 'ArrowLeft') commit('L');
  else if (e.key === 'ArrowRight') commit('R');
});
document.getElementById('restart').addEventListener('click', newGame);
// 触屏设备走 Reigns 式"拖动即预览": 隐藏底部选项按钮 (读书会反馈: 按钮文字干扰卡面)
// 玩法说明只在封面讲一次; "会死"是悬念, 不在常驻 UI 里剧透 (玩家)
if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
  document.getElementById('choices').style.display = 'none';
}

// 音效: 首次触碰解锁 AudioContext (移动端自动播放策略) + 静音开关记忆
document.addEventListener('pointerdown', () => ac(), { once: true });
const muteBtn = document.getElementById('muteBtn');
muteBtn.textContent = muted ? '🔇' : '🔊';
muteBtn.addEventListener('click', () => {
  muted = !muted;
  try { localStorage.setItem('herstory_mute', muted ? '1' : '0'); } catch (e) {}
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (!muted) SFX.era(); // 开声时给个确认音
});

// 启动: 封面页点任意处 → (有半路存档先问续不续; ?start= 显式指定时直接按指定棒开)
function startRun() {
  const saved = loadCheckpoint();
  if (saved && saved.gen > 0 && START_GEN === 0 && ERAS[saved.gen]) {
    pendingResume = saved;
    stats = saved.stats; // 让状态条先显示存档值
    legacy = { miles: saved.miles || [], notes: saved.notes || [] };
    genLog = []; reachable = new Set(saved.reachable || []); deathInfo = null;
    renderStats(null);
    document.getElementById('eraBanner').textContent =
      waveOf(ERAS[saved.gen].id).short + ' ｜ ' + ERAS[saved.gen].banner;
    showCard({
      d: '—— 存 档 ——', sp: '上次的接力还在半路', role: ERAS[saved.gen].banner, cameo: '✦',
      t: `上次你跑到了第 ${saved.gen + 1} 棒，身后已点燃 ${(saved.miles || []).length} 处火种。继续，还是从 1848 重新开始？`,
      L: { lab: '从头开始' }, R: { lab: `继续第 ${saved.gen + 1} 棒` },
    }, 'resume');
    return;
  }
  newGame();
}
document.getElementById('coverScreen').addEventListener('click', () => {
  document.getElementById('coverScreen').classList.remove('show');
  ac(); // 顺便解锁移动端音频
  startRun();
}, { once: true });
</script>
